<meta name="description" content="Este proyecto se centra en la educación vial como herramienta fundamental para potenciar la seguridad personal y la autonomía de niños y niñas con necesidades educativas especiales. A lo largo de cuatro semanas, se llevarán a cabo sesiones de una hora dos veces a la semana, donde se abordarán conceptos básicos sobre circulación peatonal, señales de tráfico y seguridad en el automóvil.">
