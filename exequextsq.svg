<div class="box-content">
<div id="idevice-1778593209048-0pa6h4c9d" class="idevice_node text" data-idevice-path="../idevices/text/" data-idevice-type="text" data-idevice-component-type="json" data-idevice-json-data="{&quot;ideviceId&quot;:&quot;idevice-1778593209048-0pa6h4c9d&quot;}">
<div class="exe-text-template">
    <p><em><strong>Título: Conceptos básicos y sensibilización</strong></em></p>
<p><em><strong>Tareas: </strong></em></p>
<ul>
<li>Ver vídeos cortos a través de la herramienta <a href="https://padlet.com/anaarenas95/educacion-vial-1w8pm3x5eyw2ksrv">https://padlet.com/anaarenas95/educacion-vial-1w8pm3x5eyw2ksrv</a> por medio de la tablet o el ordenador. </li>
<li>Participar en diálogo sencillo y comprensible.</li>
</ul>
<p><em><strong>Agrupamiento: </strong></em>Individual o en parejas.</p>
<p><em><strong>Recursos: </strong></em>Tablets u ordenadores, vídeos, pictogramas interactivos.</p>
<p><em><strong>Evaluación: </strong></em>Reconocimiento y comprensión de las normas básicas. </p>
<p><em><strong>Desarrollo: </strong></em>En clase después de anticipar que vamos a trabajar la seguridad vial, mostrar vídeos cortos seleccionados y pictogramas en la PDI, tablet u ordenador. Luego, realizaría un diálogo sencillo, usando preguntas fáciles y palabras claras, para que los niños puedan expresar oralmente o con signos lo que entendieron. La idea es que reconozcan las normas básicas de seguridad vial de forma visual y concreta, promoviendo su participación activa y comprensión.</p>
<p><br /></p>
</div>
</div>
